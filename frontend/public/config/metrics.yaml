# Cockpit Configuration
# Hierarchical metrics structure
# Layer 1 -> Layer 2 -> Layer 3

- id: layer1_1
  title: "Operational Efficiency"
  description: "Core productivity and throughput across all divisions"
  target: 95
  weight: 0.4
  thresholds: { red: 70, amber: 85 }
  subMetrics:
    - { id: l2_1_1, title: "Mfg Velocity", description: "Production speed", target: 100, metrics: 50, thresholds: { red: 70, amber: 90 } }
    - { id: l2_1_2, title: "Logistics Latency", description: "Supply chain lag", target: 5, metrics: 50, thresholds: { red: 3, amber: 4.5 } }
    - { id: l2_1_3, title: "Resource Load", description: "Asset utilization", target: 85, metrics: 50 }
    - { id: l2_1_4, title: "Quality Yield", description: "Defect-free rate", target: 99, metrics: 50 }
    - { id: l2_1_5, title: "Energy Intensity", description: "Power per unit", target: 10, metrics: 50 }
    - { id: l2_1_6, title: "Waste Reduction", description: "Recycling rate", target: 90, metrics: 50 }

- id: layer1_2
  title: "Financial Health"
  description: "Revenue, margin and burn rate metrics"
  target: 1000000
  weight: 0.3
  subMetrics:
    - { id: l2_2_1, title: "Net Margin", description: "Profit percentage", target: 25, metrics: 50 }
    - { id: l2_2_2, title: "Working Capital", description: "Liquidity ratio", target: 1.5, metrics: 50 }
    - { id: l2_2_3, title: "Burn Rate", description: "Monthly expenses", target: 500000, metrics: 50 }
    - { id: l2_2_4, title: "Rev Growth", description: "MoM growth rate", target: 15, metrics: 50 }
    - { id: l2_2_5, title: "DSO Index", description: "Days sales outstanding", target: 45, metrics: 50 }
    - { id: l2_2_6, title: "Tax Efficiency", description: "Effective rate", target: 20, metrics: 50 }

- id: layer1_3
  title: "Customer Impact"
  description: "Market sentiment and retention"
  target: 85
  weight: 0.15
  subMetrics:
    - { id: l2_3_1, title: "NPS Score", description: "Promoter baseline", target: 75, metrics: 50 }
    - { id: l2_3_2, title: "Churn Velocity", description: "Attrition speed", target: 2, metrics: 50 }
    - { id: l2_3_3, title: "Acquisition Cost", description: "CAC average", target: 150, metrics: 50 }
    - { id: l2_3_4, title: "Response Time", description: "Support latency", target: 120, metrics: 50 }
    - { id: l2_3_5, title: "Brand Equity", description: "Sentiment index", target: 80, metrics: 50 }
    - { id: l2_3_6, title: "Referral Rate", description: "Organic growth", target: 10, metrics: 50 }

- id: layer1_4
  title: "System Resilience"
  description: "Technical debt and uptime"
  target: 99.99
  weight: 0.1
  subMetrics:
    - { id: l2_4_1, title: "App Uptime", description: "Service availability", target: 99.9, metrics: 50 }
    - { id: l2_4_2, title: "Database Load", description: "Query performance", target: 60, metrics: 50 }
    - { id: l2_4_3, title: "Dev Velocity", description: "Merge frequency", target: 25, metrics: 50 }
    - { id: l2_4_4, title: "Bug Density", description: "Defects per kLoC", target: 0.5, metrics: 50 }
    - { id: l2_4_5, title: "Security Grade", description: "Vulnerability scan", target: 100, metrics: 50 }
    - { id: l2_4_6, title: "Cloud Spend", description: "Infra cost/user", target: 0.2, metrics: 50 }

- id: layer1_5
  title: "Growth Strategy"
  description: "R&D and market expansion"
  target: 100
  weight: 0.05
  subMetrics:
    - { id: l2_5_1, title: "R&D Spend", description: "Investment ratio", target: 15, metrics: 50 }
    - { id: l2_5_2, title: "New Markets", description: "Regions active", target: 12, metrics: 50 }
    - { id: l2_5_3, title: "Patent Filing", description: "IP generation", target: 5, metrics: 50 }
    - { id: l2_5_4, title: "Talent Pool", description: "Candidate pipe", target: 500, metrics: 50 }
    - { id: l2_5_5, title: "Partner ROI", description: "Channel revenue", target: 30, metrics: 50 }
    - { id: l2_5_6, title: "M&A Pipeline", description: "Deal velocity", target: 3, metrics: 50 }

- id: layer1_6
  title: "Compliance Risk"
  description: "ESG and regulatory standing"
  target: 100
  weight: 0.05
  subMetrics:
    - { id: l2_6_1, title: "GDPR Status", description: "Privacy health", target: 100, metrics: 50 }
    - { id: l2_6_2, title: "Carbon Footprint", description: "CO2 per unit", target: 50, metrics: 50 }
    - { id: l2_6_3, title: "Safety Record", description: "Incident-free days", target: 365, metrics: 50 }
    - { id: l2_6_4, title: "Ethics Audit", description: "Governance score", target: 95, metrics: 50 }
    - { id: l2_6_5, title: "Supply Diversity", description: "Partner mix", target: 25, metrics: 50 }
    - { id: l2_6_6, title: "Legal Backlog", description: "Open cases", target: 0, metrics: 50 }
